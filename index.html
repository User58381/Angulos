<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>El reloj de los ángulos - Pizza</title>
<style>
body{
font-family: Arial, sans-serif;
text-align:center;
background:#f4f4f4;
}

h1{
margin-top:20px;
}

#pizza{
margin:20px auto;
display:block;
}

.slice{
fill:#ffe8a3;
stroke:#333;
stroke-width:2;
cursor:pointer;
transition:0.2s;
}

.slice:hover{
fill:#ffd46b;
}

.selected{
fill:#ff8a65;
}

button{
padding:10px 20px;
font-size:16px;
margin:5px;
cursor:pointer;
}

#resultado{
font-size:20px;
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>🍕 El reloj de los ángulos</h1>
<p id="reto">Forma el ángulo de <b id="angulo"></b>°</p>

<svg id="pizza" width="400" height="400" viewBox="-200 -200 400 400"></svg>

<br>

<button onclick="revisar()">Revisar</button>
<button onclick="reiniciar()">Nuevo reto</button>

<p id="resultado"></p>

<script>

const pizza = document.getElementById("pizza");
const anguloTexto = document.getElementById("angulo");
const resultado = document.getElementById("resultado");

const slices = [];
let objetivo = 0;

function crearPizza(){
pizza.innerHTML="";
for(let i=0;i<12;i++){

let ang1 = (i*30-90)*Math.PI/180;
let ang2 = ((i+1)*30-90)*Math.PI/180;

let x1 = Math.cos(ang1)*180;
let y1 = Math.sin(ang1)*180;

let x2 = Math.cos(ang2)*180;
let y2 = Math.sin(ang2)*180;

let path = document.createElementNS("http://www.w3.org/2000/svg","path");

let d = `M0,0 L${x1},${y1} A180,180 0 0,1 ${x2},${y2} Z`;

path.setAttribute("d",d);
path.setAttribute("class","slice");
path.dataset.index=i;

path.addEventListener("click",()=>{
path.classList.toggle("selected");
});

pizza.appendChild(path);
slices.push(path);
}
}

function nuevoReto(){

const angulos=[30,60,90,120,150,180,210,240,270,300];
objetivo = angulos[Math.floor(Math.random()*angulos.length)];

anguloTexto.textContent=objetivo;

resultado.textContent="";
reiniciarSeleccion();
}

function reiniciarSeleccion(){
document.querySelectorAll(".slice").forEach(s=>{
s.classList.remove("selected");
});
}

function revisar(){

let seleccionadas = document.querySelectorAll(".selected").length;
let grados = seleccionadas * 30;

if(grados===objetivo){
resultado.style.color="green";
resultado.textContent="¡Correcto! "+seleccionadas+" rebanadas = "+grados+"°";
}else{
resultado.style.color="red";
resultado.textContent="Intenta otra vez. Tienes "+grados+"°";
}
}

function reiniciar(){
nuevoReto();
}

crearPizza();
nuevoReto();

</script>

</body>
</html>
